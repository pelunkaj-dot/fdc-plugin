<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="theme-color" content="#FFF8F0"/>
<title>Matýsek a Terezka učí angličtinu</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet"/>
<script src="https://code.responsivevoice.org/responsivevoice.js?key=FREE"></script>
<style>
:root {
  --cream:#FFF8F0; --warm:#FFF0DC; --dark:#2C1810; --muted:#8A6A58;
  --border:#EAD8C8; --blue:#4A9FE8; --coral:#FF6B6B; --green:#5BC26A;
  --yellow:#FFD93D; --purple:#B06EF0; --mat:#4A9FE8; --ter:#FF6B6B;
  --shadow:0 6px 24px rgba(44,24,16,.10); --r:20px;
  font-family:'Nunito',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(circle,#FFD93D44 2px,transparent 2px),
    radial-gradient(circle,#FF6B6B33 2px,transparent 2px),
    radial-gradient(circle,#4A9FE833 2px,transparent 2px);
  background-size:60px 60px,90px 90px,120px 120px;
  background-position:0 0,30px 30px,15px 45px}
.app{position:relative;z-index:1;max-width:560px;margin:0 auto;padding:16px 16px 60px}
.fredoka{font-family:'Fredoka One',cursive}
.screen{display:none}.screen.active{display:block}

/* HOME */
.home-header{text-align:center;padding:24px 0 8px}
.home-title{font-family:'Fredoka One',cursive;font-size:30px;color:var(--dark);line-height:1.2;margin-bottom:4px}
.home-sub{font-size:14px;color:var(--muted);font-weight:700}
.chars-row{display:flex;justify-content:center;align-items:flex-end;gap:12px;margin:16px 0 8px}
.char-bubble{display:flex;flex-direction:column;align-items:center;gap:4px}
.char-avatar{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:38px;box-shadow:0 4px 14px rgba(0,0,0,.12);border:3px solid white;position:relative;overflow:hidden}
.char-avatar.mat{background:#D4EEFF}.char-avatar.ter{background:#FFE8E8}
.char-name{font-family:'Fredoka One',cursive;font-size:13px;color:var(--muted)}
.speech-bubble{background:white;border-radius:16px;padding:10px 14px;font-size:13px;font-weight:800;color:var(--dark);
  box-shadow:var(--shadow);max-width:160px;text-align:center;position:relative;margin-bottom:8px;border:2px solid var(--border)}
.speech-bubble::after{content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  border:6px solid transparent;border-top-color:white}

/* Streak */
.streak-bar{display:flex;justify-content:center;margin:4px 0 12px}
.streak-badge{background:white;border-radius:999px;padding:6px 18px;
  font-family:'Fredoka One',cursive;font-size:15px;color:var(--dark);
  box-shadow:0 2px 8px rgba(0,0,0,.07);border:2px solid var(--border)}

/* Difficulty */
.diff-bar{background:white;border-radius:999px;padding:6px;display:flex;gap:6px;margin:16px 0;
  box-shadow:0 3px 12px rgba(0,0,0,.07);border:2px solid var(--border)}
.diff-btn{flex:1;border:none;border-radius:999px;padding:10px 8px;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:13px;cursor:pointer;
  transition:all .15s;color:var(--muted);background:transparent;touch-action:manipulation}
.diff-btn.active{color:white}
.diff-btn[data-d="easy"].active{background:#5BC26A}
.diff-btn[data-d="medium"].active{background:#FFB347}
.diff-btn[data-d="hard"].active{background:#FF6B6B}

/* Topic grid */
.section-title{font-family:'Fredoka One',cursive;font-size:18px;color:var(--dark);margin:20px 0 12px}
.topic-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.topic-card{border-radius:var(--r);padding:20px 12px 16px;cursor:pointer;border:3px solid transparent;
  transition:all .15s;text-align:center;box-shadow:var(--shadow);touch-action:manipulation;position:relative;overflow:hidden}
.topic-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.4) 0%,transparent 60%);pointer-events:none}
.topic-card:hover{transform:translateY(-4px);box-shadow:0 10px 32px rgba(0,0,0,.14)}
.topic-card:active{transform:scale(.97)}
.topic-emoji{font-size:40px;line-height:1;margin-bottom:8px;display:block}
.topic-name{font-family:'Fredoka One',cursive;font-size:16px;color:var(--dark);display:block}
.topic-name-cz{font-size:11px;color:var(--muted);font-weight:700;margin-top:2px}
.topic-stars{font-size:14px;margin-top:6px}
.topic-progress{position:absolute;top:8px;right:8px;display:flex;gap:2px;flex-wrap:wrap;max-width:24px}
.tp-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.5)}
.tp-dot.done{background:white}

/* Topic screen */
.topic-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.back-btn{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);background:white;
  cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;
  touch-action:manipulation;box-shadow:0 2px 8px rgba(0,0,0,.07);flex-shrink:0}
.back-btn:hover{border-color:var(--blue)}
.topic-header-info h2{font-family:'Fredoka One',cursive;font-size:24px;color:var(--dark)}
.topic-header-info p{font-size:13px;color:var(--muted);font-weight:700}
.ex-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ex-card{border-radius:var(--r);padding:22px 16px 18px;cursor:pointer;text-align:center;
  transition:all .15s;border:3px solid transparent;box-shadow:var(--shadow);touch-action:manipulation}
.ex-card:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(0,0,0,.13)}
.ex-card:active{transform:scale(.97)}
.ex-icon{font-size:40px;margin-bottom:8px;display:block}
.ex-name{font-family:'Fredoka One',cursive;font-size:17px;color:var(--dark)}
.ex-desc{font-size:12px;color:var(--muted);font-weight:700;margin-top:4px}
.ex-done-badge{display:inline-block;background:var(--green);color:white;border-radius:999px;
  padding:2px 10px;font-size:11px;font-weight:900;margin-top:6px}

/* Exercise header */
.ex-header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.ex-title-bar{flex:1;background:white;border-radius:999px;padding:8px 16px;
  box-shadow:0 2px 8px rgba(0,0,0,.07);font-family:'Fredoka One',cursive;
  font-size:16px;color:var(--dark);border:2px solid var(--border)}
.progress-dots{display:flex;gap:6px;justify-content:center;margin-bottom:16px;flex-wrap:wrap}
.pdot{width:10px;height:10px;border-radius:50%;background:var(--border);transition:all .2s}
.pdot.done{background:var(--green)}.pdot.active{background:var(--blue);width:26px;border-radius:5px}

/* Story */
.story-card{background:white;border-radius:var(--r);padding:24px;box-shadow:var(--shadow);
  margin-bottom:14px;border:2px solid var(--border)}
.story-chars{display:flex;justify-content:center;gap:24px;margin-bottom:16px}
.story-char{text-align:center}
.story-char-face{width:64px;height:64px;border-radius:50%;font-size:32px;display:flex;
  align-items:center;justify-content:center;border:3px solid white;
  box-shadow:0 3px 12px rgba(0,0,0,.10);margin:0 auto 4px}
.story-text{font-size:18px;font-weight:800;color:var(--dark);line-height:1.6;margin-bottom:10px;text-align:center}
.story-text .hl{background:var(--yellow);border-radius:6px;padding:0 4px;color:var(--dark)}
.story-cz{font-size:14px;color:var(--muted);font-weight:700;text-align:center;font-style:italic;line-height:1.5}
.play-story-btn{width:100%;border:none;border-radius:999px;padding:14px;background:var(--blue);color:white;
  font-family:'Fredoka One',cursive;font-size:18px;cursor:pointer;margin-top:14px;
  box-shadow:0 4px 14px rgba(74,159,232,.35);touch-action:manipulation;transition:all .12s}
.play-story-btn:active{transform:scale(.97)}

/* Match */
.match-instruction{text-align:center;font-size:15px;font-weight:800;color:var(--dark);
  margin-bottom:16px;background:white;border-radius:14px;padding:12px;border:2px solid var(--border)}
.match-grid-wrap{display:flex;gap:16px}
.match-col{flex:1;display:flex;flex-direction:column;gap:10px}
.match-item{background:white;border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer;
  border:3px solid transparent;box-shadow:0 3px 10px rgba(0,0,0,.07);
  transition:all .12s;touch-action:manipulation;user-select:none}
.match-item:hover{border-color:var(--blue);transform:translateY(-1px)}
.match-item.selected{border-color:var(--blue);background:#EDF5FF}
.match-item.correct{border-color:var(--green);background:#EDFFF1;animation:correctPop .3s ease}
.match-item.wrong{border-color:var(--coral);background:#FFF0F0;animation:wrongShake .3s ease}
.match-item.matched{opacity:.45;cursor:default}
@keyframes correctPop{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes wrongShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.match-emoji{font-size:36px;line-height:1;display:block;margin-bottom:4px}
.match-word{font-family:'Fredoka One',cursive;font-size:16px;color:var(--dark)}
.match-score{text-align:center;font-family:'Fredoka One',cursive;font-size:22px;color:var(--dark);margin-top:12px}

/* Listen */
.listen-card{background:white;border-radius:var(--r);padding:24px;box-shadow:var(--shadow);
  text-align:center;margin-bottom:14px;border:2px solid var(--border)}
.listen-emoji{font-size:80px;line-height:1;margin-bottom:16px;display:block}
.listen-word{font-family:'Fredoka One',cursive;font-size:36px;color:var(--dark);margin-bottom:6px}
.listen-cz{font-size:16px;color:var(--muted);font-weight:700;margin-bottom:20px}
.listen-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.listen-btn{border:none;border-radius:999px;padding:12px 24px;font-family:'Fredoka One',cursive;
  font-size:17px;cursor:pointer;transition:all .12s;touch-action:manipulation}
.listen-btn.play{background:var(--blue);color:white;box-shadow:0 4px 14px rgba(74,159,232,.35)}
.listen-btn.slow{background:#E8F3FF;color:var(--blue)}
.listen-btn:active{transform:scale(.96)}
.listen-nav{display:flex;gap:10px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.listen-nav-btn{border:2px solid var(--border);background:white;border-radius:999px;
  padding:10px 20px;font-family:'Fredoka One',cursive;font-size:15px;cursor:pointer;
  transition:all .12s;touch-action:manipulation;color:var(--dark)}
.listen-nav-btn.primary{background:var(--green);border-color:var(--green);color:white}
.listen-nav-btn:hover:not(.primary){border-color:var(--blue)}
.listen-progress-text{font-size:13px;color:var(--muted);font-weight:700;text-align:center;margin-bottom:10px}

/* Quiz — 12 question types */
@keyframes quizPop{0%{transform:scale(.7) rotate(-5deg)}60%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes qzIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
.qz-topbar{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.qz-pbar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.qz-pfill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:4px;transition:width .4s}
.qz-counter{font-family:'Fredoka One',cursive;font-size:13px;color:var(--muted);white-space:nowrap}
.qz-score{text-align:center;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:10px}
.qz-card{background:white;border-radius:var(--r);padding:20px;box-shadow:var(--shadow);margin-bottom:12px;text-align:center;border:2px solid var(--border);animation:qzIn .25s ease}
.qz-big-emoji{font-size:96px;line-height:1;display:block;margin:0 auto 6px;animation:quizPop .35s ease}
.qz-big-word{font-family:'Fredoka One',cursive;font-size:40px;color:var(--dark);margin:8px 0;animation:quizPop .3s ease}
.qz-cz-label{font-size:14px;color:var(--muted);font-weight:700;margin-top:2px}
.qz-instruction{font-size:15px;font-weight:800;color:var(--dark);margin-bottom:10px}
.qz-type-badge{display:inline-block;font-size:11px;font-weight:700;color:var(--muted);background:var(--warm);border-radius:8px;padding:2px 8px;margin-bottom:8px}
/* 2×2 choice grid */
.qz-2x2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.qz-choice{border:3px solid var(--border);background:white;border-radius:16px;padding:13px 8px;font-family:'Fredoka One',cursive;cursor:pointer;touch-action:manipulation;color:var(--dark);transition:all .12s;min-height:70px;display:flex;align-items:center;justify-content:center;flex-direction:column}
.qz-choice:hover:not(:disabled){border-color:var(--blue);background:#EDF5FF;transform:translateY(-2px)}
.qz-choice:active:not(:disabled){transform:scale(.96)}
.qz-choice.correct{border-color:var(--green)!important;background:#EDFFF1!important;animation:correctPop .3s ease}
.qz-choice.wrong{border-color:var(--coral)!important;background:#FFF0F0!important;animation:wrongShake .3s ease}
.qz-choice:disabled{cursor:default}
.qz-emoji-btn{font-size:42px;display:block;margin-bottom:2px;line-height:1}
.qz-word-btn{font-size:19px}
.qz-both-row{display:flex;align-items:center;justify-content:center;gap:7px}
.qz-both-emoji{font-size:28px}
.qz-both-word{font-size:16px;font-family:'Fredoka One',cursive}
/* True/False */
.qz-tf-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:8px}
.qz-tf-btn{border:none;border-radius:20px;padding:26px 12px;font-size:34px;cursor:pointer;touch-action:manipulation;transition:all .14s;color:white;font-family:'Fredoka One',cursive}
.qz-tf-btn.yes{background:var(--green);box-shadow:0 5px 16px rgba(91,194,106,.35)}
.qz-tf-btn.no{background:var(--coral);box-shadow:0 5px 16px rgba(255,107,107,.35)}
.qz-tf-btn:hover{transform:translateY(-3px) scale(1.03)}
.qz-tf-btn:active{transform:scale(.96)}
.qz-tf-label{font-size:14px;display:block;margin-top:4px}
.qz-tf-show{display:flex;align-items:center;justify-content:center;gap:14px;margin:8px 0}
.qz-tf-show-emoji{font-size:68px}
.qz-tf-show-word{font-family:'Fredoka One',cursive;font-size:32px;color:var(--dark)}
/* Odd one out */
.qz-oot-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px}
.qz-oot-item{border:3px solid var(--border);background:white;border-radius:16px;padding:16px 8px;text-align:center;cursor:pointer;touch-action:manipulation;transition:all .12s}
.qz-oot-item:hover{border-color:var(--blue);transform:translateY(-2px)}
.qz-oot-emoji{font-size:38px;display:block;margin-bottom:4px;line-height:1}
.qz-oot-label{font-family:'Fredoka One',cursive;font-size:15px;color:var(--dark)}
.qz-oot-item.correct{border-color:var(--green);background:#EDFFF1;animation:correctPop .3s}
.qz-oot-item.wrong{border-color:var(--coral);background:#FFF0F0;animation:wrongShake .3s}
/* Quick pick (2 big options) */
.qz-2col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:8px}
.qz-big2{border:3px solid var(--border);background:white;border-radius:20px;padding:22px 10px;text-align:center;cursor:pointer;touch-action:manipulation;transition:all .12s}
.qz-big2:hover{border-color:var(--blue);transform:scale(1.04)}
.qz-big2.correct{border-color:var(--green);background:#EDFFF1;animation:correctPop .3s}
.qz-big2.wrong{border-color:var(--coral);background:#FFF0F0;animation:wrongShake .3s}
/* Flash hide */
.qz-flash-emoji{font-size:108px;display:block;text-align:center;margin:4px auto;transition:all .5s}
.qz-flash-count{font-family:'Fredoka One',cursive;font-size:44px;color:var(--blue);text-align:center;min-height:60px}
/* Listen */
.qz-listen-icon{font-size:84px;display:block;text-align:center;margin:4px auto;cursor:pointer;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.qz-listen-replay{border:none;border-radius:999px;padding:10px 24px;background:#E8F3FF;color:var(--blue);font-family:'Fredoka One',cursive;font-size:15px;cursor:pointer;margin-top:8px;touch-action:manipulation}
/* First letter hint */
.qz-first-letter{font-family:'Fredoka One',cursive;font-size:20px;color:var(--blue);background:#E8F3FF;border-radius:12px;padding:8px 18px;display:inline-block;margin-top:6px;letter-spacing:4px}
/* Result */
.qz-result{background:white;border-radius:var(--r);padding:32px 24px;text-align:center;box-shadow:var(--shadow);border:2px solid var(--border)}
.qz-result-emoji{font-size:72px;display:block;margin-bottom:12px}
.qz-result-score{font-family:'Fredoka One',cursive;font-size:46px;color:var(--blue);margin-bottom:8px}
.qz-result-sub{font-size:14px;color:var(--muted);font-weight:700;margin-bottom:20px}

/* Memory */
.mem-score{text-align:center;font-family:'Fredoka One',cursive;font-size:18px;color:var(--dark);margin-bottom:12px}
.memory-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.mem-card{aspect-ratio:1;cursor:pointer;perspective:600px;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.mem-card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;
  transition:transform .35s ease;border-radius:14px}
.mem-card.flipped .mem-card-inner,.mem-card.matched .mem-card-inner{transform:rotateY(180deg)}
.mem-card-front,.mem-card-back{position:absolute;inset:0;backface-visibility:hidden;
  border-radius:14px;display:flex;align-items:center;justify-content:center;flex-direction:column;padding:4px}
.mem-card-front{background:linear-gradient(135deg,var(--blue),#7BC8FF);color:white;font-size:22px;
  box-shadow:0 3px 10px rgba(0,0,0,.12)}
.mem-card-back{background:white;border:3px solid var(--border);box-shadow:0 3px 10px rgba(0,0,0,.07);
  transform:rotateY(180deg)}
.mem-card.matched .mem-card-back{border-color:var(--green);background:#EDFFF1}
.mem-card.wrong-flash .mem-card-back{border-color:var(--coral);background:#FFF0F0}
.mem-emoji-big{font-size:28px;line-height:1}
.mem-word-text{font-family:'Fredoka One',cursive;font-size:13px;color:var(--dark);text-align:center;line-height:1.2;word-break:break-word}

/* Rhyme */
.rhyme-card{background:white;border-radius:var(--r);padding:28px 24px;box-shadow:var(--shadow);
  border:2px solid var(--border);margin-bottom:14px}
.rhyme-title{font-family:'Fredoka One',cursive;font-size:22px;color:var(--dark);text-align:center;margin-bottom:20px}
.rhyme-lines{display:flex;flex-direction:column;gap:12px}
.rhyme-line{font-size:17px;font-weight:800;color:var(--dark);line-height:1.4;padding:10px 16px;
  border-radius:12px;background:var(--cream);border:2px solid var(--border);
  opacity:0;transform:translateY(8px);transition:all .3s ease}
.rhyme-line.visible{opacity:1;transform:translateY(0)}
.rhyme-play-btn{width:100%;border:none;border-radius:999px;padding:14px;font-family:'Fredoka One',cursive;
  font-size:18px;cursor:pointer;margin-top:16px;transition:all .12s;touch-action:manipulation}
.rhyme-play-btn.play{background:var(--purple);color:white;box-shadow:0 4px 14px rgba(176,110,240,.35)}
.rhyme-play-btn.replay{background:var(--warm);color:var(--purple);border:2px solid var(--border)}

/* Completion */
.completion-card{background:white;border-radius:var(--r);padding:36px 24px;box-shadow:var(--shadow);
  text-align:center;border:2px solid var(--border)}
.completion-emoji{font-size:72px;line-height:1;margin-bottom:12px;display:block}
.completion-title{font-family:'Fredoka One',cursive;font-size:28px;color:var(--dark);margin-bottom:8px}
.completion-sub{font-size:15px;color:var(--muted);font-weight:700;line-height:1.5;margin-bottom:20px}
.stars-row{font-size:40px;margin-bottom:16px;letter-spacing:4px}
.completion-btns{display:flex;flex-direction:column;gap:10px}
.comp-btn{border:none;border-radius:999px;padding:14px;font-family:'Fredoka One',cursive;
  font-size:18px;cursor:pointer;transition:all .12s;touch-action:manipulation}
.comp-btn.primary{background:var(--blue);color:white;box-shadow:0 4px 14px rgba(74,159,232,.35)}
.comp-btn.secondary{background:var(--warm);color:var(--dark);border:2px solid var(--border)}

/* Confetti */
.cf{position:fixed;width:10px;height:14px;border-radius:3px;pointer-events:none;z-index:999;animation:cfFall linear forwards}
@keyframes cfFall{0%{transform:translateY(-20px) rotateZ(0)}100%{transform:translateY(100vh) rotateZ(540deg);opacity:0}}

/* Float emoji */
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(.5)}50%{opacity:1;transform:translateY(-70px) scale(1.3)}100%{opacity:0;transform:translateY(-130px) scale(.8)}}

/* Character bounce */
@keyframes charBounce{0%,100%{transform:translateY(0)}20%,60%{transform:translateY(-12px)}40%,80%{transform:translateY(-6px)}}
@keyframes charWiggle{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
.char-avatar.bouncing{animation:charBounce .7s ease}

const MAT_SVG = `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"> <ellipse cx="40" cy="26" rx="22" ry="16" fill="#C9A32A"/> <circle cx="28" cy="18" r="7" fill="#C9A32A"/> <circle cx="34" cy="13" r="7.5" fill="#C9A32A"/> <circle cx="40" cy="11" r="8" fill="#C9A32A"/> <circle cx="47" cy="13" r="7.5" fill="#C9A32A"/> <circle cx="53" cy="18" r="7" fill="#C9A32A"/> <circle cx="31" cy="10" r="5" fill="#A8821E"/> <circle cx="40" cy="6" r="5.5" fill="#A8821E"/> <circle cx="49" cy="10" r="5" fill="#A8821E"/> <circle cx="36" cy="9" r="3" fill="#E0C060" opacity="0.7"/> <circle cx="44" cy="9" r="3" fill="#E0C060" opacity="0.7"/> <circle cx="19" cy="34" r="8" fill="#C9A32A"/> <circle cx="61" cy="34" r="8" fill="#C9A32A"/> <ellipse cx="40" cy="40" rx="21" ry="22" fill="#F5CFA0"/> <ellipse cx="19" cy="40" rx="5" ry="6" fill="#F5CFA0"/> <ellipse cx="19" cy="40" rx="3" ry="4" fill="#E8B888"/> <ellipse cx="61" cy="40" rx="5" ry="6" fill="#F5CFA0"/> <ellipse cx="61" cy="40" rx="3" ry="4" fill="#E8B888"/> <ellipse cx="31" cy="35" rx="6.5" ry="5" fill="white" stroke="#2A1408" stroke-width="0.7"/> <circle cx="32" cy="35.5" r="3.5" fill="#5A7055"/> <circle cx="32" cy="35.5" r="2.2" fill="#3A4E35"/> <circle cx="33.5" cy="34" r="1.4" fill="white"/> <path d="M25 31 C28 29 34 29 37 31" fill="none" stroke="#2A1408" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/> <ellipse cx="49" cy="35" rx="6.5" ry="5" fill="white" stroke="#2A1408" stroke-width="0.7"/> <circle cx="50" cy="35.5" r="3.5" fill="#5A7055"/> <circle cx="50" cy="35.5" r="2.2" fill="#3A4E35"/> <circle cx="51.5" cy="34" r="1.4" fill="white"/> <path d="M43 31 C46 29 52 29 55 31" fill="none" stroke="#2A1408" stroke-width="0.8" stroke-linecap="round" opacity="0.5"/> <path d="M26 29 Q31 27 36 28.5" stroke="#7A5018" stroke-width="1.8" fill="none" stroke-linecap="round"/> <path d="M44 28.5 Q49 27 54 29" stroke="#7A5018" stroke-width="1.8" fill="none" stroke-linecap="round"/> <ellipse cx="40" cy="41" rx="2" ry="1.5" fill="#D89858" opacity="0.6"/> <path d="M34 47 Q40 53 46 47" fill="white" stroke="#2A1408" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/> <path d="M34 47 Q40 50 46 47" fill="#F5CFA0"/> <ellipse cx="24" cy="43" rx="7" ry="5" fill="#F09080" opacity="0.28"/> <ellipse cx="56" cy="43" rx="7" ry="5" fill="#F09080" opacity="0.28"/> <rect x="35" y="59" width="10" height="9" rx="4.5" fill="#F5CFA0"/> <path d="M16 67 L12 80 L68 80 L64 67 L53 63 Q40 59 27 63 Z" fill="#4B88D0"/> </svg>`;
const TER_SVG = `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg"> <path d="M18 20 C16 16 15 13 16 11 C17 9 19 9 20 11 C21 13 20 17 19 20 Z" fill="#5A2D0C"/> <ellipse cx="18" cy="22" rx="4" ry="2.8" fill="#D81B60"/> <ellipse cx="18" cy="22" rx="2.8" ry="1.7" fill="#FF6BAE"/> <path d="M16 25 C14 33 13 43 15 50 C16 53 19 54 20 51 C20 46 19 37 20 30 Z" fill="#5A2D0C"/> <path d="M62 20 C64 16 65 13 64 11 C63 9 61 9 60 11 C59 13 60 17 61 20 Z" fill="#5A2D0C"/> <ellipse cx="62" cy="22" rx="4" ry="2.8" fill="#D81B60"/> <ellipse cx="62" cy="22" rx="2.8" ry="1.7" fill="#FF6BAE"/> <path d="M64 25 C66 33 67 43 65 50 C64 53 61 54 60 51 C60 46 61 37 60 30 Z" fill="#5A2D0C"/> <ellipse cx="40" cy="18" rx="21" ry="13" fill="#5A2D0C"/> <ellipse cx="40" cy="33" rx="20" ry="20" fill="#F5CFA0"/> <ellipse cx="20" cy="33" rx="4.5" ry="5.5" fill="#F5CFA0"/> <ellipse cx="20" cy="33" rx="2.8" ry="3.8" fill="#E8B888"/> <ellipse cx="60" cy="33" rx="4.5" ry="5.5" fill="#F5CFA0"/> <ellipse cx="60" cy="33" rx="2.8" ry="3.8" fill="#E8B888"/> <rect x="17" y="17" width="7" height="15" rx="3.5" fill="#5A2D0C"/> <rect x="56" y="17" width="7" height="15" rx="3.5" fill="#5A2D0C"/> <ellipse cx="31" cy="28" rx="6" ry="4.8" fill="white" stroke="#2A1408" stroke-width="0.7"/> <circle cx="32" cy="28.5" r="3.2" fill="#18090A"/> <circle cx="33.6" cy="27" r="1.4" fill="white"/> <line x1="26" y1="25" x2="24" y2="21.5" stroke="#18090A" stroke-width="1.3" stroke-linecap="round"/> <line x1="28.8" y1="23.5" x2="28" y2="20" stroke="#18090A" stroke-width="1.3" stroke-linecap="round"/> <line x1="32" y1="23" x2="32" y2="19.5" stroke="#18090A" stroke-width="1.3" stroke-linecap="round"/> <line x1="35.5" y1="23.5" x2="36.5" y2="20.5" stroke="#18090A" stroke-width="1.3" stroke-linecap="round"/> <ellipse cx="49" cy="28" rx="6" ry="4.8" fill="white" stroke="#2A1408" stroke-width="0.7"/> <circle cx="50" cy="28.5" r="3.2" fill="#18090A"/> <circle cx="51.6" cy="27" r="1.4" fill="white"/> <line x1="44" y1="25" x2="42.5" y2="21.5" stroke="#18090A" stroke-width="1.3" stroke-linecap="round"/> <line x1="46.8" y1="23.5" x2="46" y2="20" stroke="#18090A" stroke-width="1.3" stroke-linecap="round"/> <line x1="50" y1="23" x2="50" y2="19.5" stroke="#18090A" stroke-width="1.3" stroke-linecap="round"/> <line x1="53.5" y1="23.5" x2="54.5" y2="20.5" stroke="#18090A" stroke-width="1.3" stroke-linecap="round"/> <path d="M26 21.5 Q31 19.5 36 21" stroke="#7A4A20" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.7"/> <path d="M44 21 Q49 19.5 54 21.5" stroke="#7A4A20" stroke-width="1.1" fill="none" stroke-linecap="round" opacity="0.7"/> <path d="M39 31 C38 33 36.5 35 37 36 C37.5 37 39 36.5 40 36.5 C41 36.5 42.5 37 43 36 C43.5 35 42 33 41 31 Z" fill="#E8A870" opacity="0.75"/> <circle cx="37.8" cy="35.5" r="1.3" fill="#C87840" opacity="0.55"/> <circle cx="42.2" cy="35.5" r="1.3" fill="#C87840" opacity="0.55"/> <path d="M33 41 Q40 48 47 41" fill="white" stroke="#2A1408" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/> <path d="M33 41 Q40 44 47 41" fill="#F5CFA0"/> <ellipse cx="23" cy="36" rx="6.5" ry="4.5" fill="#F09080" opacity="0.3"/> <ellipse cx="57" cy="36" rx="6.5" ry="4.5" fill="#F09080" opacity="0.3"/> <circle cx="20.5" cy="35" r="1.3" fill="#FFD700"/> <rect x="35" y="52" width="10" height="9" rx="4.5" fill="#F5CFA0"/> <path d="M16 60 L12 80 L68 80 L64 60 L53 56 Q40 52 27 56 Z" fill="#E24440"/> <circle cx="29" cy="67" r="3" fill="#FF8C00" opacity="0.85"/> <circle cx="29" cy="67" r="1.7" fill="#FFF176"/> <circle cx="51" cy="69" r="2.7" fill="#E2185A" opacity="0.85"/> <circle cx="51" cy="69" r="1.4" fill="#FFF176"/> <circle cx="40" cy="72" r="2.4" fill="#78C800" opacity="0.85"/> <circle cx="40" cy="72" r="1.1" fill="#FFF176"/> </svg>`;

const mkCompanion = (matTxt, terTxt) =>
  `<div class="companion-bar">
    <div class="companion-char">
      <div class="companion-avatar mat">${MAT_SVG}</div>
      <div class="companion-speech">${matTxt}</div>
    </div>
    <div class="companion-char">
      <div class="companion-speech" style="text-align:right">${terTxt}</div>
      <div class="companion-avatar ter">${TER_SVG}</div>
    </div>
  </div>`;

// ── STRIP EMOJI ───────────────────────────────────────────────────────────────
const stripEmoji = (s) => s.replace(/[\u{1F000}-\u{1FFFF}\u{2600}-\u{27BF}]/gu,'').replace(/\s+/g,' ').trim();

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentDiff  = 'easy';
let currentTopic = null;
let currentEx    = null;
let listenIdx    = 0;
let matchSelected = null;
let matchPairs   = [];
let matchDone    = 0;
let storyPage    = 0;
let stars        = 0;
let progress     = {};

const loadProgress = () => {
  try {
    const s = localStorage.getItem('matyter_v2');
    if (s) { const d = JSON.parse(s); stars = d.stars||0; progress = d.progress||{}; }
  } catch(_){}
};
const saveProgress = () => {
  try {
    const s = localStorage.getItem('matyter_v2');
    const existing = s ? JSON.parse(s) : {};
    localStorage.setItem('matyter_v2', JSON.stringify({...existing, stars, progress}));
  } catch(_){}
};

// ── STREAK ────────────────────────────────────────────────────────────────────
const updateStreak = () => {
  try {
    const s = localStorage.getItem('matyter_v2');
    const data = s ? JSON.parse(s) : {};
    const today = new Date().toDateString();
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    let streak = data.streak || 1;
    if (data.lastVisit === today) { return streak; }
    if (data.lastVisit === yesterday) { streak++; }
    else { streak = 1; }
    localStorage.setItem('matyter_v2', JSON.stringify({...data, streak, lastVisit: today}));
    return streak;
  } catch { return 1; }
};

// ── SCREENS ───────────────────────────────────────────────────────────────────
const showScreen = (id) => {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo({top:0,behavior:'smooth'});
};

// ── HOME ──────────────────────────────────────────────────────────────────────
const matSpeeches = [
  "Hello! I am Matýsek! 👋","Let's learn English! 📚",
  "You are doing great! ⭐","Can you say 'butterfly'? 🦋",
  "English is fun! 😄","How many words do you know? 🔢",
  "Let's read a story! 📖","What is your favourite topic? 🎯"
];
const terSpeeches = [
  "Hi! I am Terezka! 🌸","Come and play with us! 🎮",
  "Well done! Keep going! 💪","My favourite colour is pink! 🩷",
  "You are amazing! ✨","Can you feel happy in English? 😄",
  "Let's play the memory game! 🧩","I love ice cream! 🍦"
];

const renderHome = () => {
  loadProgress();
  updateXP();
  const streak = updateStreak();
  document.getElementById('streakBadge').textContent = `🔥 ${streak} ${streak === 1 ? 'den' : streak < 5 ? 'dny' : 'dní'} v řadě`;
  document.getElementById('matSpeech').textContent = matSpeeches[Math.floor(Math.random()*matSpeeches.length)];
  document.getElementById('terSpeech').textContent = terSpeeches[Math.floor(Math.random()*terSpeeches.length)];

  // Insert avatars
  document.getElementById('avatarMat').innerHTML = MAT_SVG;
  document.getElementById('avatarTer').innerHTML = TER_SVG;

  const grid = document.getElementById('topicGrid');
  grid.innerHTML = '';
  APP_DATA.topics.forEach(topic => {
    const prog = progress[topic.id] || {};
    const doneCount = EX_KEYS.filter(k => prog[k]).length;
    const card = document.createElement('div');
    card.className = 'topic-card';
    card.style.background = topic.colorLight;
    card.style.borderColor = doneCount === 6 ? topic.color : 'transparent';
    const dots = EX_KEYS.map(k => `<div class="tp-dot${prog[k]?' done':''}"></div>`).join('');
    card.innerHTML = `
      <div class="topic-progress">${dots}</div>
      <span class="topic-emoji">${topic.emoji}</span>
      <span class="topic-name">${topic.title}</span>
      <div class="topic-name-cz">${topic.titleCz}</div>
      <div class="topic-stars">${doneCount===6?'🏆':doneCount>0?'⭐'.repeat(Math.min(doneCount,6)):''}</div>
    `;
    card.onclick = () => openTopic(topic.id);
    grid.appendChild(card);
  });

  // Periodic character bounce
  if (window._bounceTmr) clearInterval(window._bounceTmr);
  window._bounceTmr = setInterval(() => {
    const ids = ['avatarMat','avatarTer'];
    const el = document.getElementById(ids[Math.floor(Math.random()*2)]);
    if (el && !el.classList.contains('bouncing')) {
      el.classList.add('bouncing');
      setTimeout(() => el.classList.remove('bouncing'), 800);
    }
  }, 3000);
};

const setDiff = (d) => {
  currentDiff = d;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.toggle('active', b.dataset.d === d));
};

const updateXP = () => {
  const maxStars = APP_DATA.topics.length * 6;
  const totalDone = APP_DATA.topics.reduce((acc, t) => {
    const p = progress[t.id] || {};
    return acc + EX_KEYS.filter(k => p[k]).length;
  }, 0);
  stars = totalDone;
  const pct = Math.round(totalDone / maxStars * 100);
  document.getElementById('xpFill').style.width = pct + '%';
  document.getElementById('xpLabel').textContent = totalDone + ' hvězd';
};

const goHome = () => {
  if (window._bounceTmr) clearInterval(window._bounceTmr);
  renderHome();
  showScreen('screenHome');
};

// ── TOPIC ─────────────────────────────────────────────────────────────────────
const openTopic = (id) => {
  currentTopic = APP_DATA.topics.find(t => t.id === id);
  const prog = progress[id] || {};
  document.getElementById('topicHeaderTitle').textContent = currentTopic.emoji + ' ' + currentTopic.title;
  document.getElementById('topicHeaderSub').textContent = currentTopic.titleCz;

  const exercises = [
    {id:'story',  icon:'📖',name:'Příběh',  desc:'Matýsek a Terezka vypráví', fn:startStory},
    {id:'listen', icon:'🔊',name:'Poslouchej',desc:'Slyš a opakuj slovo',     fn:startListen},
    {id:'match',  icon:'🔗',name:'Spoj',    desc:'Obrázek + anglické slovo',  fn:startMatch},
    {id:'quiz',   icon:'🎯',name:'Kvíz',    desc:'Vyber správné slovo',       fn:startQuiz},
    {id:'memory', icon:'🧩',name:'Paměť',   desc:'Najdi dvojice karet',       fn:startMemory},
    {id:'rhyme',  icon:'📜',name:'Říkanka', desc:'Vyslovíme spolu nahlas',    fn:startRhyme},
  ];

  const grid = document.getElementById('exGrid');
  grid.innerHTML = '';
  exercises.forEach(ex => {
    const done = prog[ex.id];
    const card = document.createElement('div');
    card.className = 'ex-card';
    card.style.background = done ? currentTopic.colorLight : 'white';
    card.style.borderColor = done ? currentTopic.color : 'transparent';
    card.innerHTML = `
      <span class="ex-icon">${ex.icon}</span>
      <div class="ex-name">${ex.name}</div>
      <div class="ex-desc">${ex.desc}</div>
      ${done ? '<span class="ex-done-badge">✓ Hotovo</span>' : ''}
    `;
    card.onclick = ex.fn;
    grid.appendChild(card);
  });
  showScreen('screenTopic');
};

const goTopic = () => openTopic(currentTopic.id);

// ── STORY ─────────────────────────────────────────────────────────────────────
const startStory = () => {
  currentEx = 'story'; storyPage = 0;
  renderStoryPage(); showScreen('screenStory');
};

const renderStoryPage = () => {
  const pages = currentTopic.stories[currentDiff];
  const page = pages[storyPage];
  const total = pages.length;
  const isLast = storyPage === total - 1;

  const words = currentTopic.words.map(w => w.en);
  let highlighted = page.en;
  words.forEach(word => {
    const re = new RegExp('\\b' + word.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '\\b', 'gi');
    highlighted = highlighted.replace(re, `<span class="hl">${word}</span>`);
  });

  const matFaceHTML = `<div class="story-char"><div class="story-char-face" style="background:#D4EEFF;overflow:hidden">${MAT_SVG}</div><div style="font-family:Fredoka One,cursive;font-size:12px;color:var(--muted);margin-top:4px">Matýsek</div></div>`;
  const terFaceHTML = `<div class="story-char"><div class="story-char-face" style="background:#FFE8E8;overflow:hidden">${TER_SVG}</div><div style="font-family:Fredoka One,cursive;font-size:12px;color:var(--muted);margin-top:4px">Terezka</div></div>`;
  let charsHTML = page.char==='mat' ? matFaceHTML : page.char==='ter' ? terFaceHTML : matFaceHTML+terFaceHTML;

  const dots = pages.map((_,i) => {
    const cls = i<storyPage?'done':i===storyPage?'active':'';
    return `<div class="pdot ${cls}"></div>`;
  }).join('');

  const matTxt = page.char==='ter' ? 'Terezka vypráví...' : 'Poslouchej příběh!';
  const terTxt = isLast ? 'Konec příběhu! 🎉' : 'Čti i česky níže!';
  const navLeft = storyPage>0
    ? `<button class="listen-nav-btn" onclick="storyBack()" style="flex:1">← Zpět</button>`
    : `<button class="listen-nav-btn" onclick="goTopic()" style="flex:1">↩ Téma</button>`;
  const navRight = isLast
    ? `<button class="listen-nav-btn primary" style="flex:2" onclick="completeEx('story')">Hotovo! ⭐</button>`
    : `<button class="listen-nav-btn primary" style="flex:2" onclick="storyNext()">Dál → (${storyPage+1}/${total})</button>`;

  document.getElementById('storyContent').innerHTML =
    mkCompanion(matTxt, terTxt) +
    `<div class="progress-dots">${dots}</div>` +
    `<div class="story-card" style="background:${page.bg||'#fff'}">
      <div class="story-chars">${charsHTML}</div>
      <div class="story-text">${highlighted}</div>
      <div class="story-cz">${page.cz}</div>
      <button class="play-story-btn" onclick="speakEN('${escQ(page.en)}')">🔊 Přehrát anglicky</button>
    </div>` +
    `<div style="display:flex;gap:10px;margin-top:10px;">${navLeft}${navRight}</div>`;

  setTimeout(() => speakEN(page.en), 400);
};

const storyNext = () => { storyPage++; renderStoryPage(); window.scrollTo({top:0,behavior:'smooth'}); };
const storyBack = () => { storyPage--; renderStoryPage(); window.scrollTo({top:0,behavior:'smooth'}); };

// ── LISTEN ────────────────────────────────────────────────────────────────────
const startListen = () => {
  currentEx = 'listen'; listenIdx = 0; renderListenCard(); showScreen('screenListen');
};

const renderListenCard = () => {
  const words = currentTopic.words;
  const w = words[listenIdx];
  const total = words.length;
  document.getElementById('listenContent').innerHTML = mkCompanion('Poslouchej a opakuj! 🔊','Zvládneš to! 💪') +
    `<div class="listen-progress-text">${listenIdx+1} / ${total}</div>
    <div class="progress-dots">${words.map((_,i) => {
      const cls = i<listenIdx?'done':i===listenIdx?'active':'';
      return `<div class="pdot ${cls}"></div>`;
    }).join('')}</div>
    <div class="listen-card">
      <span class="listen-emoji">${w.emoji}</span>
      <div class="listen-word">${w.en}</div>
      <div class="listen-cz">${w.cz}</div>
      <div class="listen-btns">
        <button class="listen-btn play" onclick="speakEN('${escQ(w.en)}')">🔊 Přehrát</button>
        <button class="listen-btn slow" onclick="speakEN('${escQ(w.en)}',0.6)">🐢 Pomalu</button>
      </div>
    </div>
    <div class="listen-nav">
      ${listenIdx>0?`<button class="listen-nav-btn" onclick="listenPrev()">← Zpět</button>`:''}
      ${listenIdx<total-1
        ?`<button class="listen-nav-btn primary" onclick="listenNext()">Další →</button>`
        :`<button class="listen-nav-btn primary" onclick="completeEx('listen')">Hotovo! ⭐</button>`}
    </div>`;
  setTimeout(() => speakEN(w.en), 400);
};

const listenNext = () => { listenIdx++; renderListenCard(); };
const listenPrev = () => { listenIdx--; renderListenCard(); };

// ── MATCH ─────────────────────────────────────────────────────────────────────
const startMatch = () => {
  currentEx = 'match'; matchSelected = null; matchDone = 0;
  const words = shuffle([...currentTopic.words]).slice(0, 5);
  const emojis = shuffle(words.map(w => ({...w, type:'emoji'})));
  const texts  = shuffle(words.map(w => ({...w, type:'word'})));
  matchPairs = words;

  const leftHTML = emojis.map(w =>
    `<div class="match-item" id="emoji_${w.en}" data-val="${w.en}" data-type="emoji" onclick="matchTap(this)">
      <span class="match-emoji">${w.emoji}</span>
      <div style="font-size:11px;color:var(--muted);font-weight:700">${w.cz}</div>
    </div>`).join('');
  const rightHTML = texts.map(w =>
    `<div class="match-item" id="word_${w.en}" data-val="${w.en}" data-type="word" onclick="matchTap(this)">
      <span class="match-word">${w.en}</span>
    </div>`).join('');

  document.getElementById('matchContent').innerHTML =
    mkCompanion('Spoj obrázek se slovem!','Klikni na správný pár!') +
    `<div class="match-instruction">Spoj obrázek s anglickým slovem! 👆</div>
    <div class="match-grid-wrap">
      <div class="match-col">${leftHTML}</div>
      <div class="match-col">${rightHTML}</div>
    </div>
    <div class="match-score" id="matchScore"></div>`;
  showScreen('screenMatch');
};

const matchTap = (el) => {
  if (el.classList.contains('matched') || el.classList.contains('correct')) return;
  if (!matchSelected) {
    document.querySelectorAll('.match-item.selected').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected'); matchSelected = el; return;
  }
  if (matchSelected.dataset.type === el.dataset.type) {
    matchSelected.classList.remove('selected'); el.classList.add('selected'); matchSelected = el; return;
  }
  if (matchSelected.dataset.val === el.dataset.val) {
    el.classList.add('correct','matched');
    matchSelected.classList.remove('selected'); matchSelected.classList.add('correct','matched');
    matchSelected = null; matchDone++;
    soundOk(); speakEN(el.dataset.val);
    floatEmoji(currentTopic.words.find(w=>w.en===el.dataset.val)?.emoji||'⭐');
    if (matchDone === Math.min(5, currentTopic.words.length)) {
      launchConfetti(20);
      document.getElementById('matchScore').innerHTML =
        `<div style="color:var(--green)">🌟 Všechno správně!</div>
        <div style="margin-top:12px;display:flex;gap:10px;">
          <button class="listen-nav-btn" onclick="goTopic()" style="flex:1">← Zpět</button>
          <button class="listen-nav-btn primary" style="flex:2" onclick="completeEx('match')">Hotovo! ⭐</button>
        </div>`;
    }
  } else {
    el.classList.add('wrong'); matchSelected.classList.add('wrong');
    soundErr();
    const prev = matchSelected;
    setTimeout(() => { el.classList.remove('wrong','selected'); prev.classList.remove('wrong','selected'); matchSelected = null; }, 600);
  }
};

// ── QUIZ ENGINE ───────────────────────────────────────────────────────────────

  emojiToWord: ['Jak se řekne anglicky? 🎯','Klikni na správné slovo!'],
  wordToEmoji: ['Klikni na správný obrázek! 👆','Najdi ten správný!'],

  listenEmoji: ['Klikni na obrázek! 👂','Slyšíš to slovo?'],
  trueOrFalse: ['Správně nebo špatně? 🤔','Sedí to dohromady?'],
  oddOneOut:   ['Který sem nepatří? 🔍','Jedno je jinak!'],
  reverseEmoji:['Najdi správný obrázek! 🇨🇿','Klikni na to!'],

const startQuiz = () => {
  currentEx='quiz';
  quizQueue=generateQuizQuestions(QUIZ_TOTAL);
  quizQIdx=0; quizCorrect=0;
  renderCurrentQ(); showScreen('screenQuiz');
};

const generateQuizQuestions = (n) => {
  const w = currentTopic.words;
  const allOther = APP_DATA.topics.filter(t=>t.id!==currentTopic.id).flatMap(t=>t.words);
  const qs = [];
  const wrong3 = (word) => shuffle(w.filter(x=>x.en!==word.en)).slice(0,3);

  w.forEach(word => {
    const wc = wrong3(word);
    // 1 emoji→EN
    qs.push({type:'emojiToWord', word, choices:shuffle([word,...wc]), correctVal:word.en});
    // 2 EN→emoji
    qs.push({type:'wordToEmoji', word, choices:shuffle([word,...wc]), correctVal:word.en});
    // 3 CZ→EN
    qs.push({type:'czToEn', word, choices:shuffle([word,...wc]), correctVal:word.en});
    // 4 EN→CZ
    qs.push({type:'enToCz', word, choices:shuffle([word,...wc]), correctVal:word.en});
    // 5 listen→EN word
    qs.push({type:'listenWord', word, choices:shuffle([word,...wc]), correctVal:word.en});
    // 6 listen→emoji
    qs.push({type:'listenEmoji', word, choices:shuffle([word,...wc]), correctVal:word.en});
    // 7 true/false
    const isTrue=Math.random()>.5;
    const fakeW=isTrue?word:wc[Math.floor(Math.random()*wc.length)];
    qs.push({type:'trueOrFalse', word, showWord:fakeW, isCorrect:isTrue, correctVal:isTrue?'yes':'no'});
    // 8 odd one out
    const intruder=shuffle(allOther)[0];
    const three=shuffle(w.filter(x=>x.en!==word.en)).slice(0,3);
    qs.push({type:'oddOneOut', word, intruder, items:shuffle([...three,intruder]), correctVal:intruder.en});
    // 9 CZ→emoji
    qs.push({type:'reverseEmoji', word, choices:shuffle([word,...wc]), correctVal:word.en});
    // 10 emoji + first letter→EN
    qs.push({type:'firstLetter', word, choices:shuffle([word,...wc]), correctVal:word.en});
    // 11 quick pick (2 options)
    qs.push({type:'quickPick', word, choices:shuffle([word,wc[0]]), correctVal:word.en});
    // 12 flash then pick
    qs.push({type:'flashHide', word, choices:shuffle([word,...wc]), correctVal:word.en});
  });
  return shuffle(qs).slice(0,n);
};

};

const pickChoice = (el, chosen, correctVal, emoji) => {
  document.querySelectorAll('.qz-choice,.qz-tf-btn,.qz-oot-item,.qz-big2').forEach(b=>{
    b.disabled=true; b.onclick=null; b.style.pointerEvents='none';
  });
  const isRight = chosen===correctVal;
  document.querySelectorAll('[data-val]').forEach(b=>{
    if(b.dataset.val===correctVal) b.classList.add('correct');
  });
  if(isRight){
    el.classList.add('correct');
    playCorrectSound(); floatEmoji(emoji||'⭐'); quizCorrect++;
    if(quizQueue[quizQIdx]?.word) speakEN(quizQueue[quizQIdx].word.en);
  } else {
    el.classList.add('wrong'); playWrongSound();
  }
  setTimeout(()=>{
    quizQIdx++;
    if(quizQIdx<quizQueue.length) renderCurrentQ();
    else showQuizResult();
  }, isRight?900:1600);
};

  const total=quizQueue.length, pct=quizCorrect/total;
  const medal=pct===1?'🏆':pct>=.8?'🌟':pct>=.6?'⭐':'💪';
  const msg=pct===1?'Naprosto perfektní! 🎉':pct>=.8?'Skoro perfektní! 🌟':pct>=.6?'Dobrá práce! 👍':'Zkus to znovu! 💪';
  document.getElementById('quizContent').innerHTML=
    mkCompanion(pct===1?'Výborně! 🏆':'Dobrá práce!',pct>=.8?'Neuvěřitelné! 🎉':'Příště to dáš!')+
    `<div class="qz-result">
      <span class="qz-result-emoji">${medal}</span>
      <div class="qz-result-score">${quizCorrect} / ${total}</div>
      <div style="font-family:'Fredoka One',cursive;font-size:22px;color:var(--dark);margin-bottom:8px">${msg}</div>
      <div class="qz-result-sub">Zvládl/a jsi ${quizCorrect} z ${total} otázek${pct===1?' — bez jediné chyby!':''}</div>
      <div style="display:flex;gap:10px;">

        <button class="comp-btn primary" style="flex:2" onclick="completeEx('quiz')">Hotovo! ⭐</button>

const memTap = (i) => {
  if (memLocked) return;
  const card = document.getElementById(`mc_${i}`);
  if (!card || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  soundFlip(); card.classList.add('flipped'); memFlipped.push(i);
  if (memFlipped.length < 2) return;
  memLocked = true;
  const [a, b] = memFlipped;
  if (memCards[a].val === memCards[b].val && memCards[a].type !== memCards[b].type) {
    setTimeout(() => {
      document.getElementById(`mc_${a}`).classList.add('matched');
      document.getElementById(`mc_${b}`).classList.add('matched');
      memMatched++;
      document.getElementById('memScore').textContent = `Nalezeno: ${memMatched} / 6`;
      soundOk(); speakEN(memCards[a].val);
      floatEmoji(memCards[a].type==='emoji' ? memCards[a].display : memCards[b].display);
      memFlipped = []; memLocked = false;
      if (memMatched === 6) {
        launchConfetti(35); soundLvl();
        document.getElementById('memNav').innerHTML =
          `<div style="display:flex;gap:10px;margin-top:8px;">
            <button class="listen-nav-btn" onclick="startMemory()" style="flex:1">↺ Znovu</button>
            <button class="listen-nav-btn primary" style="flex:2" onclick="completeEx('memory')">Hotovo! ⭐</button>
          </div>`;
      }
    }, 400);
  } else {
    setTimeout(() => {
      const ca = document.getElementById(`mc_${a}`);
      const cb = document.getElementById(`mc_${b}`);
      if(ca) { ca.classList.add('wrong-flash'); setTimeout(()=>ca.classList.remove('wrong-flash'),300); ca.classList.remove('flipped'); }
      if(cb) { cb.classList.add('wrong-flash'); setTimeout(()=>cb.classList.remove('wrong-flash'),300); cb.classList.remove('flipped'); }
      soundErr(); memFlipped = []; memLocked = false;
    }, 900);
  }
};

// ── SPEECH ────────────────────────────────────────────────────────────────────
const speakEN = (text, rate=1.0) => {
  text = stripEmoji(text); if (!text) return;
  if (typeof responsiveVoice !== 'undefined') {
    responsiveVoice.cancel();
    responsiveVoice.speak(text, 'UK English Female', {rate: rate<0.8?0.6:1});
    return;
  }
  const synth = window.speechSynthesis; if (!synth) return;
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-GB'; u.rate = rate;
  const voices = synth.getVoices() || [];
  const v = voices.find(v => v.lang.startsWith('en-GB')) || voices.find(v => v.lang.startsWith('en'));
  if (v) u.voice = v;
  synth.speak(u);
};

// ── AUDIO ─────────────────────────────────────────────────────────────────────
let actx = null;
const getCtx = () => {
  if (!actx) try { actx = new (window.AudioContext||window.webkitAudioContext)(); } catch(_){}
  if (actx?.state==='suspended') actx.resume().catch(()=>{});
  return actx;
};
const tone = (f,type,dur,vol=0.15,t0=0) => {
  const c=getCtx(); if(!c) return;
  const t=c.currentTime+t0;
  try {
    const o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type=type; o.frequency.value=f;
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.start(t); o.stop(t+dur);
  } catch(_){}
};
const sweep = (f0,f1,dur,vol=0.14) => {
  const c=getCtx(); if(!c) return;
  const t=c.currentTime;
  try {
    const o=c.createOscillator(), g=c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type='sine'; o.frequency.setValueAtTime(f0,t);
    o.frequency.linearRampToValueAtTime(f1,t+dur);
    g.gain.setValueAtTime(vol,t);
    g.gain.exponentialRampToValueAtTime(.001,t+dur+.05);
    o.start(t); o.stop(t+dur+.1);
  } catch(_){}
};
const noiseBurst = (dur=.08,vol=.15) => {
  const c=getCtx(); if(!c) return;
  try {
    const buf=c.createBuffer(1,Math.floor(c.sampleRate*dur),c.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*.4));
    const src=c.createBufferSource(); src.buffer=buf;
    const g=c.createGain(); g.gain.value=vol;
    src.connect(g); g.connect(c.destination); src.start(c.currentTime);
  } catch(_){}
};

const CF_COLORS = ['#FFD93D','#FF6B6B','#6BCB77','#4A9FE8','#C77DFF','#FF9F47'];
const launchConfetti = (n=18) => {
  for (let i=0; i<n; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'cf';
      const dur = .8+Math.random()*1.2;
      el.style.cssText = `left:${Math.random()*100}vw;top:-20px;background:${CF_COLORS[Math.floor(Math.random()*CF_COLORS.length)]};transform:rotateZ(${Math.random()*360}deg);animation-duration:${dur}s`;
      document.body.appendChild(el);
      const rm = () => { if(el.parentNode) el.remove(); };
      el.addEventListener('animationend',rm,{once:true});
      setTimeout(rm,(dur+.5)*1000);
    }, i*50);

};

const shuffle = (arr) => {
  const a = [...arr];
  for (let i=a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
};
